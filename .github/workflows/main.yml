name: GPS Service CI/CD
 
on:
  push:
    branches: [main]          # Trigger on push to main
  pull_request:
    branches: [main]          # Also run checks on pull requests
 
jobs:
 
  # ─── Job 1: Run Tests ───────────────────────────────────────────────────────
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # Pulls your repo code into the GitHub Actions runner
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        run: pip install -r app/requirements.txt pytest
 
      - name: Run tests
        run: pytest tests/ -v
 
  # ─── Job 2: Build & Push Docker Image ────────────────────────────────────── 
  build-and-push:
    name: Build & Push Docker Image
    needs: test                  # Only runs if tests pass
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'   # Only on main branch, not PRs
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}    # Set in GitHub repo secrets
          password: ${{ secrets.DOCKER_PASSWORD }}    # Set in GitHub repo secrets
 
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app         # Build from the app/ folder
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/gps-service:latest
 
  # ─── Job 3: Deploy to Kubernetes ─────────────────────────────────────────── 
  deploy:
    name: Deploy to Minikube
    needs: build-and-push        # Only runs after image is pushed
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
 
      - name: Write kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG }}" > kubeconfig.yaml
          # KUBECONFIG secret = base64-encoded output of: kubectl config view --raw
 
      - name: Apply Kubernetes manifests
        run: |
          kubectl --kubeconfig=kubeconfig.yaml apply -f k8s/deployment.yaml
          kubectl --kubeconfig=kubeconfig.yaml apply -f k8s/service.yaml
 
      - name: Verify deployment
        run: |
          kubectl --kubeconfig=kubeconfig.yaml rollout status deployment/gps-service
