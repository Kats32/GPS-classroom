apiVersion: v1
kind: Service
metadata:
  name: gps-service
spec:
  selector:
    app: gps-service               # Matches the pods from deployment.yaml
  ports:
  - protocol: TCP
    port: 80                       # External port
    targetPort: 5000               # Internal container port
  type: NodePort                   # NodePort makes it accessible via minikube IP

